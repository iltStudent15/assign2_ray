<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Creator | Contact</title>
    <meta
      name="description"
      content="Accessible contact form page for the student project website."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="wrap header-content">
        <p class="brand">Campus Creator</p>
        <nav aria-label="Primary navigation">
          <ul class="nav-list">
            <li><a class="nav-link" href="index.html">Home</a></li>
            <li><a class="nav-link" href="projects.html">Projects</a></li>
            <li><a class="nav-link current" href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="wrap page-intro">
        <h1>Contact</h1>
        <p>Share feedback about this assignment submission using the form below.</p>
      </section>

      <section class="wrap form-panel" aria-label="Contact form section">
        <form class="contact-form" action="#" method="post">
          <div class="field-group">
            <label for="full-name">Full Name</label>
            <input id="full-name" name="full-name" type="text" autocomplete="name" required />
          </div>

          <div class="field-group">
            <label for="email">Email Address</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field-group">
            <label for="topic">Topic</label>
            <select id="topic" name="topic" required>
              <option value="">Select one</option>
              <option value="design">Design feedback</option>
              <option value="code">Code quality</option>
              <option value="accessibility">Accessibility notes</option>
            </select>
          </div>

          <div class="field-group">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              rows="5"
              aria-describedby="message-hint"
              required
            ></textarea>
            <p id="message-hint" class="hint">
              Include at least one detail about layout, structure, or responsiveness.
            </p>
          </div>

          <button class="button" type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="wrap footer-content">
        <p>Created for Assignment 2 | May 2026</p>
      </div>
    </footer>
  </body>
</html>
